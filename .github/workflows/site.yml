name: Site

# Build-check the marketing/docs site (site/). Decoupled from the Rust CI
# (ci.yml) — only runs when site/ changes — so a broken Astro build is
# caught before a deploy push, without coupling to the workspace build.
on:
  push:
    branches: [main]
    paths: ["site/**", ".github/workflows/site.yml"]
  pull_request:
    branches: [main]
    paths: ["site/**", ".github/workflows/site.yml"]

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: site/dist
          if-no-files-found: error
          retention-days: 7
