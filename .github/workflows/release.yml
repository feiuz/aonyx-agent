name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0). Must already exist."
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # Build Linux on Ubuntu 22.04 (glibc 2.35), NOT ubuntu-latest
          # (24.04 = glibc 2.39): a binary built against an older glibc is
          # forward-compatible, so it also runs on newer hosts AND on older
          # ones like Debian 12 (glibc 2.36). For systems below 2.35, use
          # `cargo install aonyx-agent`.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            ext: ""
            archive: tar.gz
          # Native ARM Linux build on a GitHub-hosted arm64 runner (avoids
          # cross-compiling sqlite `bundled` + the ONNX runtime behind
          # fastembed). 22.04 → glibc 2.35 floor, same as the x86_64 job.
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
            ext: ""
            archive: tar.gz
          # Build the Intel macOS binary by cross-compiling on the ARM
          # runner: the macos-13 (Intel) runners are deprecated and queue
          # forever. The toolchain step adds the x86_64 target, and Apple
          # clang on Apple silicon cross-compiles x86_64 natively.
          - target: x86_64-apple-darwin
            os: macos-14
            ext: ""
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            ext: ""
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: ".exe"
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.96.0
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build aonyx (lean + full)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p staging
          # Lean default binary (small; matches `cargo install aonyx-agent`).
          cargo build --release --locked -p aonyx-agent --target ${{ matrix.target }}
          cp "target/${{ matrix.target }}/release/aonyx${{ matrix.ext }}" "staging/aonyx-lean${{ matrix.ext }}"
          # Full binary: every channel adapter + Lua plugins compiled in.
          cargo build --release --locked -p aonyx-agent \
            --features telegram,discord,openai-server,lua-plugins,browser,api \
            --target ${{ matrix.target }}
          cp "target/${{ matrix.target }}/release/aonyx${{ matrix.ext }}" "staging/aonyx-full${{ matrix.ext }}"

      - name: Resolve tag name
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Archive (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.name }}"
          for variant in lean full; do
            suffix=""
            [ "$variant" = "full" ] && suffix="-full"
            name="aonyx-$tag-${{ matrix.target }}$suffix"
            mkdir -p "dist/$name"
            cp "staging/aonyx-$variant${{ matrix.ext }}" "dist/$name/aonyx${{ matrix.ext }}"
            cp LICENSE README.md "dist/$name/"
            tar -czf "dist/$name.tar.gz" -C dist "$name"
            rm -rf "dist/$name"
          done

      - name: Archive (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $tag = "${{ steps.tag.outputs.name }}"
          foreach ($variant in @("lean", "full")) {
            $suffix = if ($variant -eq "full") { "-full" } else { "" }
            $name = "aonyx-$tag-${{ matrix.target }}$suffix"
            New-Item -ItemType Directory -Force -Path "dist/$name" | Out-Null
            Copy-Item "staging/aonyx-$variant${{ matrix.ext }}" "dist/$name/aonyx${{ matrix.ext }}"
            Copy-Item LICENSE,README.md "dist/$name/"
            Compress-Archive -Path "dist/$name" -DestinationPath "dist/$name.zip"
            Remove-Item -Recurse -Force "dist/$name"
          }

      - uses: actions/upload-artifact@v4
        with:
          name: aonyx-${{ matrix.target }}
          path: dist/aonyx-*.*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Compute SHA-256 for each artifact
        shell: bash
        run: |
          cd dist
          shasum -a 256 aonyx-*.* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Resolve tag name
        id: tag
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: Aonyx Agent ${{ steps.tag.outputs.name }}
          body_path: CHANGELOG.md
          files: |
            dist/aonyx-*.*
            dist/SHA256SUMS.txt
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.name, '-') }}
